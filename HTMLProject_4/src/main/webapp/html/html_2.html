<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" href="table.css">
<style>
h3{
	text-align: center;
}
table{
	margin: 0px auto;
}
</style>
</head>
<body>
	<h3>회원가입</h3>
	<table id="table_content">
		<tbody>
			<tr>
				<th width="15%">id</th>
				<td width="85%">
					<input type="text" size="20"/><input type="button" value="중복체크"/>
				</td>
			</tr>
			<tr>
				<th width="15%">pw</th>
				<td width="85%">
					<input type="password" size="20"/>
					<input type="password" size="20" placeholder="재입력"/>
				</td>
			</tr>
			<tr>
				<th width="15%">name</th>
				<td width="85%">
					<input type="text" size="20"/>
				</td>
			</tr>
			<tr>
				<th width="15%">gender</th>
				<td width="85%">
					<input type="radio" name="gender" checked/>남자
					<input type="radio" name="gender" />여자
				</td>
			</tr>
			<tr>
				<th width="15%">email</th>
				<td width="85%">
					<input type="text" size="20" />
				</td>
			</tr>
			<tr>
				<th width="15%">주소</th>
				<td width="85%">
					<input type="text" size="45" readonly/>
				</td>
			</tr>
			<tr>
				<th width="15%">상세주소</th>
				<td width="85%">
					<input type="text" size="45"/>
				</td>
			</tr>
			<tr>
				<th width="15%">전화번호</th>
				<td width="85%">
					<select>
						<option>010</option>
					</select>
					&nbsp;<input type="text" size=20/>
				</td>
			</tr>
				<tr>
				<th width="15%">사진</th>
				<td width="85%">
					<input type="file" size=20/>
				</td>
			</tr>
			</tr>
				<tr>
				<th width="15%">소개</th>
				<td width="85%">
					<textarea rows="10" cols="45"></textarea>
				</td>
			</tr>
			</tr>
				<tr>
				<td colspan="2" align="center">
					<input type="submit" value="join">
					<input type="button" value="cancel">
				</td>
			</tr>
		</tbody>
	</table>
</body>
</html>
