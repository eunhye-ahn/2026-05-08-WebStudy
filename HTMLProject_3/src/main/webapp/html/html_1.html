<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<table border=1 bordercolor="black" width=500>
		<tbody >
			<tr>
				<td>한줄 문자열</td>
				<td><input type=text size=15></td>
			</tr>
			<tr>
				<td>암호 문자열</td>
				<td><input type=password size=15></td>
			</tr>
			<tr>
				<td>파일 다이얼로그</td>
				<td><input type=file size=30 multiple></td>
			</tr>
			<tr>
				<td>스피너</td>
				<td><input type=number min="1" max="100"></td>
			</tr>
			<tr>
				<td>슬라이더</td>
				<td><input type=range min="10000" max="50000"></td>
			</tr>
			<tr>
				<td>달력</td>
				<td><input type=date></td>
			</tr>
			<tr>
				<td>일반버튼</td>
				<td><input type=button value="로그인"></td>
			</tr>
			<tr>
				<td>전송버튼</td>
				<td><input type=submit value="전송"></td>
			</tr>
			<tr>
				<td>초기화버튼</td>
				<td><input type=reset value="초기화"></td>
			</tr>
			<tr>
				<td>전송_1 버튼(submit)</td>
				<td><button>전송_1 버튼</button></td>
			</tr>
			<tr>
				<td>전송_2 버튼(image)</td>
				<td><input type="image" src="re_icon.png"></td>
			</tr>
			<tr>
				<td>라디오 버튼</td>
				<td>
					<input type="radio" name="gender">남자
					<input type="radio" name="gender">여자
				</td>
			</tr>
			<tr>
				<td>체크박스</td>
				<td>
					<input type="checkbox">고구마
					<input type="checkbox">감자
				</td>
			</tr>
			<tr>
				<td>보안</td>
				<td>
					<input type="hidden">
				</td>
			</tr>
			<tr>
				<td>여러줄-멀티라인</td>
				<td>
					<textarea rows="5" cols="30"> </textarea>
				</td>
			</tr>
			<tr>
				<td>콤보박스</td>
				<td>
					<select multiple>
						<option>업체명</option>
						<option>주소</option>
					</select>
				</td>
			</tr>
		</tbody>
	</table>
</body>
</html>
