<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" href="table.css">
<style>
h3{
	text-align: center;
}
table{
	margin: 0px auto;
}
td{
	color:red;
}
</style>
</head>
<body>
	<h3>글쓰기</h3>
	<table id="table_content" width="700">
		<tbody>
			<tr>
				<th>이름</th>
				<td><input type="text" size=15></td>
			</tr>
			<tr>
				<th>이메일</th>
				<td><input type="text" size=15></td>
			</tr>
			<tr>
				<th>제목</th>
				<td><input type="text" size=30></td>
			</tr>
			<tr>
				<th>첨부파일</th>
				<td><input type="file" size=20></td>
			</tr>
			<tr>
				<th>내용</th>
				<td><textarea rows="10" cols="38"></textarea></td>
			</tr>
			<tr>
				<th>비밀번호</th>
				<td><input type="password" size=15></td>
			</tr>
			<tr>
				<td colspan="2" align="center">
					<input type="submit" value="글쓰기">
					<input type="button" value="취소">
				</td>
			</tr>
		</tbody>
	</table>
</body>
</html>
