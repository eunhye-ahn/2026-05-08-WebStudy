<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<!--  import -->
<script type="text/javascript" src="http://code.jquery.com/jquery.js"></script>
<script type="text/javascript">
	let i =0;
	$(function(){
		$('a').click(function(){
			if(i==0){
				$('a').text("닫기")
				i=1;
				$('div').show();
			}
			else{
				$('a').text("더보기")
				i=0;
				$('div').hide();
			}
		})
	})
</script>
</head>
<body>
	<pre>전 세계를 열광시킨 ‘런웨이’ 전설들의 귀환!

전 세계 트렌드를 주도해 온 전설적인 패션 매거진 ‘런웨이’가
급변하는 미디어 시장 속에서 예기치 못한 위기에 직면한다.

‘런웨이’를 지켜내려는 편집장 ‘미란다’와
20년 만에 신임 기획 에디터로 당당히 돌아온 ‘앤디’,
그리고 이제는 럭셔리 브랜드 임원이 되어 다시 나타난 ‘에밀리’까지
<a href="#">더보기</a>
<div style="display: none">
더 화려하고, 치열해진 뉴욕 패션계에서
주도권을 차지하기 위해 벌이는 이들의 새로운 이야기가 펼쳐진다!</div></pre>
</body>
</html>
