<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
li:first-child {
	color: green;
	background: yellow;
}
li:last-child {
	color: red;
}
li:nth-child(2n){
	color:orange;
}
li:nth-child(2n+1){
	color:magenta;
}
</style>
</head>
<body>
	<ul>
		<li>메뉴1</li>
		<li>메뉴2</li>
		<li>메뉴3</li>
		<li>메뉴4</li>
		<li>메뉴5</li>
	</ul>
</body>
</html>
