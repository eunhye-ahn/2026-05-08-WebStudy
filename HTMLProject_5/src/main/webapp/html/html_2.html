<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
div > p+h1 {
	background: rgb(0,255,255);
	color: green;
}
div span h1 {
	background: #9C6BDB;
}
div > p~h1{
	background: rgb(186,72,160);
}
</style>
</head>
<body>
	<div>
		<p>Hello</p>
		<h1>형제1</h1>
		<h1>형제2</h1>
		<span>
			<h1>후손1</h1>
		</span>
	</div>
</body>
</html>
